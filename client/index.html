<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* background-color: #f0f0f0; */
            background-color: #9c9c9c;
        }

        .container {
            background: #f0f0f0;
            padding: 40px;
            border-radius: 12px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h3 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #333;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: gray;
        }

        button {
            padding: 12px 16px;
            border: none;
            background: black;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #222222;
        }

        #result {
            margin-top: 20px;
            font-size: 14px;
            word-break: break-all;
        }

        a {
            color: blue;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>
    <div class="container">
        <h3>URL Shortener</h3>
        <form id="shortenForm">
            <input id="url" type="url" placeholder="Enter URL to shorten" required>
            <button type="submit">
                Shorten
            </button>

        </form>

        <p id="result"></p>

    </div>

    <script>

        const form = document.getElementById("shortenForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const url = document.getElementById("url").value;
            const result = document.getElementById("result");
            result.innerText = "Generating...";

            try {
                const res = await fetch("https://url-shortener.adityaraghav0112.workers.dev/shorten", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (data.error) {
                    result.innerText = data.error;
                    return;
                }

                result.innerHTML = `
                Short URL:
                <br><br>
                <a href="${data.short}" target="_blank">${data.short}</a>
                `;
            }
            catch (err) {
                result.innerText = "Something went wrong.";
            }
        });

    </script>

</body>

</html>
